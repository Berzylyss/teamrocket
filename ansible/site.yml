---
- name: Configurer les serveurs web (nginx + page HTML)
  hosts: web
  become: true
  roles:
    - webserver

- name: Installer node-exporter sur les serveurs web (métriques)
  hosts: web
  become: true
  roles:
    - node_exporter

- name: Déployer Prometheus + Grafana (supervision)
  hosts: monitoring
  become: true
  roles:
    - monitoring
