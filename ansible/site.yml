---
- name: Configurer les serveurs web (nginx + page HTML)
  hosts: web
  become: true
  roles:
    - webserver
    - node_exporter
    - hardening

- name: Configurer le serveur FTP (vsftpd)
  hosts: ftp
  become: true
  roles:
    - ftpserver
    - node_exporter
    - hardening

- name: Déployer la supervision (Prometheus + Grafana)
  hosts: monitoring
  become: true
  roles:
    - hardening
    - monitoring
